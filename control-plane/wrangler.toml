# Cloudflare Workers — Sandboxed Agent Execution Platform
# Docs: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "saep-control-plane"
main = "src/index.ts"
compatibility_date = "2024-01-01"

workers_dev = true

# Local development values. Use `wrangler secret put API_KEY` and
# `wrangler secret put ORCHESTRATOR_TOKEN` for real deployments.
[vars]
ENVIRONMENT = "development"
SANDBOX_ORCHESTRATOR_URL = "http://127.0.0.1:9999"
API_KEY = "dev-api-key"
ORCHESTRATOR_TOKEN = "dev-internal-token"

